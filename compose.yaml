name: flight-viewer

services:
  db:
    image: postgres:16
    container_name: flight-viewer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flight_viewer}
      POSTGRES_USER: ${POSTGRES_USER:-flight_viewer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flight-viewer

  backend:
    build:
      context: ./backend
    container_name: flight-viewer-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-flight_viewer}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-flight_viewer}
      PHOTO_ROOT: /data/photos
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://flight-viewer-api.moritzknodler.com}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://flight-viewer.moritzknodler.com}
      ALLOWED_ORIGIN_REGEX: ${ALLOWED_ORIGIN_REGEX:-^https://flight-viewer-[a-z0-9-]+\.vercel\.app$}
    ports:
      - "127.0.0.1:8003:8000"
    volumes:
      - photo_data:/data/photos
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - flight-viewer

volumes:
  postgres_data:
    name: flight-viewer-postgres
  photo_data:
    name: flight-viewer-photos

networks:
  flight-viewer:
    name: flight-viewer
